# Full fine-tuning config. Runs on a single GPU (>= 16 GB VRAM) or Apple Silicon MPS.
# Uses Nucleotide Transformer v2 100M — standard transformers code paths, works on
# both CUDA and MPS (no Triton / Flash Attention requirements).
model_name: InstaDeepAI/nucleotide-transformer-v2-100m-multi-species
trust_remote_code: true

data:
  processed_dir: data/processed
  window_size: 1000          # bases per training example (NT-v2 uses 6-mer tokens)
  eval_windows_per_plasmid: 8
  max_tokens: 256            # ~167 6-mer tokens for a 1000bp window, with headroom

training:
  output_dir: checkpoints/default
  num_train_epochs: 5
  per_device_train_batch_size: 16
  per_device_eval_batch_size: 32
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 2
  load_best_model_at_end: true
  metric_for_best_model: macro_f1
  greater_is_better: true
  class_weighted_loss: true
  seed: 42
  fp16: true

labels:
  top_n_genera: 20
  other_label: Other

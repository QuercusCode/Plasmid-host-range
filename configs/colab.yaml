# Colab Pro config. Checkpoints saved to Google Drive for crash resilience.
# Works on T4, A100, or any CUDA GPU. ~2-4 hours on A100, ~4-6 hours on T4.
model_name: InstaDeepAI/nucleotide-transformer-v2-100m-multi-species
trust_remote_code: true

data:
  processed_dir: data/processed
  window_size: 1000
  eval_windows_per_plasmid: 8
  max_tokens: 256

training:
  # NOTE: output_dir is overridden by the notebook to point at Google Drive.
  output_dir: checkpoints/colab_run
  num_train_epochs: 5
  per_device_train_batch_size: 32
  per_device_eval_batch_size: 64
  learning_rate: 2.0e-5
  weight_decay: 0.01
  warmup_ratio: 0.1
  eval_strategy: epoch
  save_strategy: epoch
  save_total_limit: 3
  load_best_model_at_end: true
  metric_for_best_model: macro_f1
  greater_is_better: true
  class_weighted_loss: true
  seed: 42
  fp16: true

labels:
  top_n_genera: 20
  other_label: Other
